name: Build iOS IPA (Unsigned)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Cho phép chạy thủ công trên GitHub

jobs:
  build-ios:
    name: Build Unsigned iOS App
    runs-on: macos-latest

    steps:
      # 1. Checkout repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Tạo file .env giả định từ .env.example để tránh lỗi build
      - name: Create mock env file
        run: cp .env.example .env

      # 3. Setup môi trường Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.x' # Đồng bộ phiên bản với máy bạn
          cache: true

      # 4. Cài đặt các package của Flutter
      - name: Get packages
        run: flutter pub get

      # 5. Cài đặt Pods cho iOS
      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # 6. Biên dịch ứng dụng iOS ở chế độ Release không ký số
      - name: Build iOS without signing
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      # 7. Đóng gói Runner.app thành file .ipa chưa ký số (Unsigned)
      - name: Package IPA
        run: |
          mkdir -p build/ios/unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/unsigned/Payload/Runner.app
          cd build/ios/unsigned
          zip -r SnapStudy-unsigned.ipa Payload
          mv SnapStudy-unsigned.ipa ../../../

      # 8. Upload file .ipa làm sản phẩm đầu ra (Artifacts)
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapstudy-ios-unsigned
          path: SnapStudy-unsigned.ipa
          retention-days: 7
