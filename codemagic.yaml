workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store   # hoặc 'ad_hoc' để test trực tiếp không qua Store
        bundle_identifier: com.snapstudy.snapstudy
      vars:
        BUNDLE_ID: "com.snapstudy.snapstudy"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
        working_directory: ios

      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Xcode archive & export
        script: |
          xcode-project use-profiles
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath "$CM_BUILD_DIR/output"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration   # Kết nối từ Codemagic dashboard
        submit_to_testflight: true

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - snapstudy_keystore   # Tạo keystore group trong Codemagic dashboard
      vars:
        PACKAGE_NAME: "com.snapstudy.snapstudy"
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android APK
        script: |
          flutter build apk --release --no-tree-shake-icons

      - name: Build Android AppBundle (for Play Store)
        script: |
          flutter build appbundle --release --no-tree-shake-icons

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
