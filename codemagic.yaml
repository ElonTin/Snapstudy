workflows:
  ios-unsigned-sideload:
    name: iOS Unsigned IPA for Sideload
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.snapstudy.snapstudy"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Create CI .env
        script: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-http://10.0.2.2:5000}
          ENV=development
          ENABLE_FIREBASE=${ENABLE_FIREBASE:-false}
          APP_NAME=SNAPSTUDY
          AUTH_DEV_MODE=${AUTH_DEV_MODE:-true}
          GOOGLE_SERVER_CLIENT_ID=${GOOGLE_SERVER_CLIENT_ID:-}
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL=gemini-2.5-flash
          GROQ_API_KEY=$GROQ_API_KEY
          GROQ_MODEL=llama-3.3-70b-versatile
          ENABLE_PREPROCESSING=false
          ENABLE_OCR_ENHANCEMENT=true
          AI_SUMMARY_DEV_MODE=false
          AI_SUMMARY_FORCE_MOCK=false
          FLASHCARDS_DEV_MODE=false
          FLASHCARDS_FORCE_MOCK=false
          QUIZ_DEV_MODE=false
          QUIZ_FORCE_MOCK=false
          MINDMAP_DEV_MODE=false
          MINDMAP_FORCE_MOCK=false
          OCR_ENGINE=auto
          ENABLE_FCM=${ENABLE_FCM:-false}
          ENABLE_PUSH_REGISTRATION=${ENABLE_PUSH_REGISTRATION:-false}
          PUSH_REGISTER_PATH=/api/notifications/devices
          DASHBOARD_CACHE_TTL_SECONDS=45
          SESSION_LIST_CACHE_TTL_SECONDS=30
          IMAGE_CACHE_MAX_MB=120
          IMAGE_CACHE_MAX_COUNT=200
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: pod install
        working_directory: ios

      - name: Build iOS archive (no signing)
        script: |
          set -eo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            FLUTTER_BUILD_DIR=build \
            SKIP_BUNDLING=YES 2>&1 | tee /tmp/xcodebuild.log
          echo "=== Archive contents ==="
          ls -la "$CM_BUILD_DIR/Runner.xcarchive/Products/Applications/" || echo "WARNING: Archive path not found!"

      - name: Package unsigned IPA from archive
        script: |
          set -eo pipefail
          APP_PATH=$(find "$CM_BUILD_DIR/Runner.xcarchive" -name "*.app" -maxdepth 4 | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p "$CM_BUILD_DIR/unsigned/Payload"
          cp -R "$APP_PATH" "$CM_BUILD_DIR/unsigned/Payload/Runner.app"
          cd "$CM_BUILD_DIR/unsigned"
          zip -qr SnapStudy-unsigned.ipa Payload
          echo "IPA size: $(du -sh SnapStudy-unsigned.ipa)"

    artifacts:
      - $CM_BUILD_DIR/unsigned/SnapStudy-unsigned.ipa
      - /tmp/xcodebuild.log
      - /tmp/xcodebuild_logs/*.log

  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store   # hoặc 'ad_hoc' để test trực tiếp không qua Store
        bundle_identifier: com.snapstudy.snapstudy
      vars:
        BUNDLE_ID: "com.snapstudy.snapstudy"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
        working_directory: ios

      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Xcode archive & export
        script: |
          xcode-project use-profiles
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath "$CM_BUILD_DIR/output"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    # publishing:
    #   app_store_connect:
    #     auth: integration   # Kết nối từ Codemagic dashboard
    #     submit_to_testflight: true

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - snapstudy_keystore   # Tạo keystore group trong Codemagic dashboard
      vars:
        PACKAGE_NAME: "com.snapstudy.snapstudy"
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android APK
        script: |
          flutter build apk --release --no-tree-shake-icons

      - name: Build Android AppBundle (for Play Store)
        script: |
          flutter build appbundle --release --no-tree-shake-icons

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
