name: snapstudy
description: Smart Capture, Active Learning – Transform classroom photos into structured knowledge.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Firebase & Google Sign-In
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.4
  google_sign_in: ^6.3.0

  # Notifications (Phase 14)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Environment & utilities
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  logger: ^2.5.0
  equatable: ^2.0.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  camera: ^0.11.1
  permission_handler: ^11.4.0
  flutter_image_compress: ^2.3.0
  image: ^4.8.0
  google_mlkit_text_recognition: ^0.15.1
  flutter_math_fork: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
